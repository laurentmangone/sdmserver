services:
  sdmserver:
    image: lmangone/sdmserver:latest
    container_name: sdmserver
    restart: unless-stopped
    ports:
      - "5900:5900"
    volumes:
      - ./downloads:/app/downloads
      - ./config:/app/config
    environment:
      - PORT=5900
      - DOWNLOAD_DIR=/app/downloads
      - CONFIG_DIR=/app/config
      - MAX_CONCURRENT_DOWNLOADS=3
      - REQUEST_TIMEOUT=3600
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5900/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
