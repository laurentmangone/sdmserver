<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Download Manager Server</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Super Download Manager Server</h1>
            <div class="header-actions">
                <div class="health-status" id="health">
                    <span class="status-dot"></span>
                    <span>Connecting...</span>
                </div>
                <button class="btn-settings" onclick="showSettings()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </header>
        
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <h3>Settings</h3>
                <div class="setting-item">
                    <label for="max-concurrent">Max concurrent downloads:</label>
                    <input type="number" id="max-concurrent" min="1" max="20" value="3">
                </div>
                <div class="modal-buttons">
                    <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
                    <button class="btn-save" onclick="saveSettings()">Save</button>
                </div>
            </div>
        </div>

        <main>
            <section class="add-download">
                <h2>Add Download</h2>
                <form id="download-form">
                    <input type="url" id="url-input" placeholder="Enter URL to download..." required>
                    <button type="submit">Download</button>
                </form>
                <div class="batch-upload">
                    <p>Or upload a file with URLs (one per line):</p>
                    <input type="file" id="file-input" accept=".txt">
                    <button type="button" id="batch-btn">Add from File</button>
                </div>
            </section>

            <section class="downloads-list">
                <div class="downloads-header">
                    <h2>Downloads</h2>
                    <div class="header-actions">
                        <button class="btn-clear-all" onclick="clearAllDownloads()">Clear All</button>
                        <div class="filter-buttons">
                            <button class="filter-btn active" data-filter="all">All <span class="count">(0)</span></button>
                            <button class="filter-btn" data-filter="queued">Queued <span class="count">(0)</span></button>
                            <button class="filter-btn" data-filter="downloading">Downloading <span class="count">(0)</span></button>
                            <button class="filter-btn" data-filter="completed">Completed <span class="count">(0)</span></button>
                            <button class="filter-btn" data-filter="failed">Failed <span class="count">(0)</span></button>
                        </div>
                    </div>
                </div>
                <div id="downloads-container">
                    <p class="empty-state">No downloads yet</p>
                </div>
            </section>
        </main>
    </div>

    <script src="/app.js?v=15"></script>
</body>
</html>
